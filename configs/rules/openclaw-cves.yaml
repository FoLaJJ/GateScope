  severity: medium
  cvss: 4.8
  affected_before: ''
  description: OpenClaw is a personal AI assistant. Prior to version 2026.2.15, `normalizeForHash` in `src/agents/sandbox/config-hash.ts`
    recursively sorted arrays that contained only primitive values. This made order-sensitive sandbox configuration arrays
    hash to the same value even when order changed. In OpenClaw sandbox flows, this hash is used to decide whether existing
    sandbox containers should be recreated. As a result, order-only config changes (for example Docker `dns` and `binds` array
