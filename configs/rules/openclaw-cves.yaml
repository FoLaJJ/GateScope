  remediation: Upgrade to >= 2026.3.28
  description_zh: 该漏洞与“Privilege Escalation in /pair approve”相关。受影响版本为 2026.3.28 之前。成功利用后可能导致未授权访问、权限提升或安全策略绕过。
- id: CVE-2026-33578
