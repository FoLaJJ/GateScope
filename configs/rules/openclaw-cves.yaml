meta:
  updated_at: "2026-04-03"
  verified_at: "2026-04-03"
  source_cutoff: "2026-04-02"
  source: "CVE Details vendor list 38835 (OpenClaw) with local rule normalization"
  notes: "PoC severity/CVSS/remediation are normalized from the matching CVE entry when cve_id is present."

cves:
  - id: "CVE-2026-27009"
    title: "Stored XSS in Control UI Assistant Identity Rendering"
    severity: "medium"
    cvss: 5.8
    affected_before: "2026.2.15"
    description: "Assistant name or avatar values can break out of an inline script context in the Control UI and execute attacker-controlled JavaScript."
    remediation: "Upgrade to >= 2026.2.15 and avoid serving bootstrap config through inline scripts"
  - id: "CVE-2026-24764"
    title: "Slack Channel Metadata Prompt Injection"
    severity: "low"
    cvss: 3.7
    affected_before: "2026.2.3"
    description: "When Slack integration is enabled, untrusted channel topic or description metadata can be treated as higher-trust prompt context and expand prompt-injection surface."
    remediation: "Upgrade to >= 2026.2.3 and avoid trusting external Slack metadata as system-level prompt input"
  - id: "CVE-2026-34510"
    title: "SMB Path Injection via Upload Inputs"
    severity: "medium"
    cvss: 5.3
    affected_before: "2026.3.28"
    description: "Untrusted upload path inputs can trigger SMB-style outbound path resolution and expose the host to unintended network file access."
    remediation: "Upgrade to >= 2026.3.28 and reject external or UNC-style upload paths"
  - id: "CVE-2026-34509"
    title: "Pair Approval Scope Escalation"
    severity: "high"
    cvss: 8.6
    affected_before: "2026.3.28"
    description: "Low-privilege operators can approve pairing requests with broader scopes than intended because approval-time scope validation is incomplete."
    remediation: "Upgrade to >= 2026.3.28"
  - id: "CVE-2026-34508"
    title: "Inbound Policy Downgrade in Route Sender Controls"
    severity: "medium"
    cvss: 5.3
    affected_before: "2026.3.28"
    description: "Sender control rules can silently degrade to a more permissive state, allowing unauthorized inbound interactions with configured bots."
    remediation: "Upgrade to >= 2026.3.28"
  - id: "CVE-2026-34506"
    title: "Node Pair Caller Scope Validation Bypass"
    severity: "high"
    cvss: 8.6
    affected_before: "2026.3.28"
    description: "Caller scopes are not enforced correctly in node pairing approval logic, enabling broader device privileges than the operator should receive."
    remediation: "Upgrade to >= 2026.3.28"
  - id: "CVE-2026-34505"
    title: "Pre-Authorization Media Fetch and Disk Write"
    severity: "medium"
    cvss: 6.9
    affected_before: "2026.3.28"
    description: "Inbound media can be fetched and written to disk before sender authorization is verified, allowing unwanted network and storage activity."
    remediation: "Upgrade to >= 2026.3.28"
  - id: "CVE-2026-34504"
    title: "Revoked Session Persistence on Existing WebSockets"
    severity: "high"
    cvss: 8.6
    affected_before: "2026.3.28"
    description: "Revoked tokens or removed devices do not always terminate already-established WebSocket sessions, permitting continued access until reconnect."
    remediation: "Upgrade to >= 2026.3.28 and force re-authentication after revocation"
  - id: "CVE-2026-34426"
    title: "Secret Brute Force on Nextcloud Talk Webhooks"
    severity: "medium"
    cvss: 6.5
    affected_before: "2026.3.28"
    description: "Weak webhook secrets can be brute-forced because inbound authentication lacks sufficient rate limiting and retry controls."
    remediation: "Upgrade to >= 2026.3.28 and rotate weak webhook secrets"
  - id: "CVE-2026-34425"
    title: "Message Tool Alias URL Sandbox Escape"
    severity: "high"
    cvss: 8.6
    affected_before: "2026.3.24"
    description: "Alias URL parameters used by message tools can bypass local root checks and expose files outside the intended sandbox."
    remediation: "Upgrade to >= 2026.3.24"
  - id: "CVE-2026-34503"
    title: "Revoked WebSocket Sessions Stay Alive"
    severity: "high"
    cvss: 8.6
    affected_before: "2026.3.28"
    description: "Removed devices or revoked tokens do not terminate already-authenticated WebSocket sessions, allowing continued unauthorized access until reconnect."
    remediation: "Upgrade to >= 2026.3.28 and force re-auth after device removal or token revocation"
  - id: "CVE-2026-33581"
    title: "Message Tool Sandbox Bypass via Alias URLs"
    severity: "high"
    cvss: 8.6
    affected_before: "2026.3.24"
    description: "Alias parameters such as mediaUrl and fileUrl can bypass localRoots validation and expose arbitrary local files outside the intended sandbox."
    remediation: "Upgrade to >= 2026.3.24"
  - id: "CVE-2026-33580"
    title: "Nextcloud Talk Webhook Secret Brute Force"
    severity: "medium"
    cvss: 6.5
    affected_before: "2026.3.28"
    description: "Missing rate limiting on Nextcloud Talk webhook authentication allows brute-forcing weak shared secrets and forging inbound webhook events."
    remediation: "Upgrade to >= 2026.3.28 and rotate weak webhook secrets"
  - id: "CVE-2026-33579"
    title: "Privilege Escalation in /pair approve"
    severity: "high"
    cvss: 8.6
    affected_before: "2026.3.28"
    description: "The /pair approve flow does not propagate caller scopes correctly, allowing non-admin pairing users to approve broader device scopes including admin access."
    remediation: "Upgrade to >= 2026.3.28"
  - id: "CVE-2026-33578"
    title: "Sender Policy Downgrade in Google Chat and Zalouser"
    severity: "medium"
    cvss: 5.3
    affected_before: "2026.3.28"
    description: "Route-level group allowlist policies can silently downgrade to open policy, letting unauthorized senders interact with bots."
    remediation: "Upgrade to >= 2026.3.28"
  - id: "CVE-2026-33577"
    title: "Node Pairing Scope Validation Bypass"
    severity: "high"
    cvss: 8.6
    affected_before: "2026.3.28"
    description: "Low-privilege operators can approve node pairing requests with broader scopes because callerScopes validation is missing in the node approval path."
    remediation: "Upgrade to >= 2026.3.28"
  - id: "CVE-2026-33576"
    title: "Unauthorized Media Fetch and Disk Write"
    severity: "medium"
    cvss: 6.9
    affected_before: "2026.3.28"
    description: "Inbound Zalo media is downloaded and stored before sender authorization is checked, allowing unauthorized senders to trigger network fetches and disk writes."
    remediation: "Upgrade to >= 2026.3.28"
  - id: "CVE-2026-33575"
    title: "Long-Lived Gateway Credentials in Setup Codes"
    severity: "high"
    cvss: 8.6
    affected_before: "2026.3.12"
    description: "Pairing setup codes embed reusable shared gateway credentials, so leaked QR codes or chat history can expose credentials beyond the intended one-time flow."
    remediation: "Upgrade to >= 2026.3.12 and rotate exposed setup codes or shared gateway credentials"
  - id: "CVE-2026-33574"
    title: "Skills Installer Path Traversal Race"
    severity: "medium"
    cvss: 6.2
    affected_before: "2026.3.8"
    description: "The skills download installer validates the tools root lexically but reuses a mutable path later, enabling path traversal or redirection outside the intended tools directory."
    remediation: "Upgrade to >= 2026.3.8"
  - id: "CVE-2026-33573"
    title: "Gateway Agent RPC Workspace Escape"
    severity: "high"
    cvss: 8.8
    affected_before: "2026.3.11"
    description: "Authenticated operators can supply attacker-controlled spawnedBy or workspaceDir values to escape workspace boundaries and execute file or exec operations in arbitrary directories."
    remediation: "Upgrade to >= 2026.3.11"
  - id: "CVE-2026-33572"
    title: "Readable Session Transcript Files"
    severity: "high"
    cvss: 8.4
    affected_before: "2026.2.17"
    description: "Session transcript JSONL files are created with overly broad permissions, allowing local users to read sensitive tool output and secrets."
    remediation: "Upgrade to >= 2026.2.17 and tighten transcript file permissions"
  - id: "CVE-2026-32987"
    title: "Bootstrap Setup Code Replay"
    severity: "critical"
    cvss: 9.8
    affected_before: "2026.3.13"
    description: "Bootstrap setup codes can be replayed during device pairing verification, allowing repeated verification and privilege escalation of pending pairing scopes."
    remediation: "Upgrade to >= 2026.3.13"
  - id: "CVE-2026-32980"
    title: "Telegram Webhook Pre-Auth Resource Exhaustion"
    severity: "high"
    cvss: 8.7
    affected_before: "2026.3.13"
    description: "Telegram webhook request bodies are read and buffered before the secret token is validated, allowing unauthenticated attackers to consume memory and socket time."
    remediation: "Upgrade to >= 2026.3.13"
  - id: "CVE-2026-32979"
    title: "Approval Integrity Bypass via Script Rewrite"
    severity: "high"
    cvss: 7.3
    affected_before: "2026.3.11"
    description: "When exact file binding is not possible, attackers can modify approved local scripts between approval and execution to run different code."
    remediation: "Upgrade to >= 2026.3.11"
  - id: "CVE-2026-32978"
    title: "system.run Mutable Operand Approval Bypass"
    severity: "critical"
    cvss: 9.4
    affected_before: "2026.3.11"
    description: "Approvals for certain script runners such as tsx or jiti do not bind mutable file operands, allowing attackers to rewrite approved scripts before execution."
    remediation: "Upgrade to >= 2026.3.11"
  - id: "CVE-2026-32976"
    title: "configWrites Bypass on Sibling Accounts"
    severity: "high"
    cvss: 7.1
    affected_before: "2026.3.11"
    description: "Channel commands can mutate protected sibling-account configuration despite configWrites restrictions, enabling unauthorized configuration changes."
    remediation: "Upgrade to >= 2026.3.11"
  - id: "CVE-2026-32975"
    title: "Zalouser Allowlist Name Collision Bypass"
    severity: "critical"
    cvss: 9.8
    affected_before: "2026.3.12"
    description: "Zalouser allowlist mode matches mutable group display names instead of stable identifiers, allowing spoofed groups to bypass authorization."
    remediation: "Upgrade to >= 2026.3.12"
  - id: "CVE-2026-32974"
    title: "Feishu Webhook Forged Event Injection"
    severity: "critical"
    cvss: 9.8
    affected_before: "2026.3.12"
    description: "Feishu webhook mode accepts forged events when only verificationToken is configured without encryptKey, enabling unauthenticated event injection and downstream tool execution."
    remediation: "Upgrade to >= 2026.3.12 and configure encryptKey for webhook deployments"
  - id: "CVE-2026-32973"
    title: "Exec Allowlist Pattern Overmatch"
    severity: "critical"
    cvss: 9.8
    affected_before: "2026.3.11"
    description: "Improper normalization in matchesExecAllowlistPattern lets wildcard patterns overmatch on POSIX paths, bypassing exec allowlist intent."
    remediation: "Upgrade to >= 2026.3.11"
  - id: "CVE-2026-25253"
    title: "ClawJacked: WebSocket Hijack to RCE"
    severity: "high"
    cvss: 8.8
    affected_before: "2026.2.25"
    description: "Malicious websites can hijack local OpenClaw Gateway via WebSocket without Origin validation, enabling brute-force of auth token and full agent takeover."
    remediation: "Upgrade to >= 2026.2.25"
  - id: "CVE-2026-26972"
    title: "Path Traversal via crafted skill paths"
    severity: "high"
    cvss: 7.5
    affected_before: "2026.3.2"
    description: "Crafted skill installation path allows reading arbitrary files outside the skills directory."
    remediation: "Upgrade to >= 2026.3.2"
  - id: "CVE-2026-28470"
    title: "Exec Whitelist Bypass"
    severity: "critical"
    cvss: 9.8
    affected_before: "2026.3.2"
    description: "Bypass of command execution whitelist allows running arbitrary shell commands through the agent."
    remediation: "Upgrade to >= 2026.3.2"
  - id: "CVE-2026-26327"
    title: "mDNS Gateway Spoofing"
    severity: "high"
    cvss: 7.2
    affected_before: "2026.2.25"
    description: "Unauthenticated mDNS service advertisement allows gateway spoofing on local network."
    remediation: "Upgrade to >= 2026.2.25 and disable mDNS in production"
  - id: "CVE-2026-24163"
    title: "Remote Code Execution via Skill Installation"
    severity: "critical"
    cvss: 9.8
    affected_before: "2026.1.24"
    description: "Malicious skills can execute arbitrary code during installation without proper sandboxing."
    remediation: "Upgrade to >= 2026.1.24"
  - id: "CVE-2026-22234"
    title: "Server-Side Request Forgery (SSRF)"
    severity: "high"
    cvss: 7.5
    affected_before: "2026.2.14"
    description: "Agent can be tricked into making requests to internal network resources."
    remediation: "Upgrade to >= 2026.2.14"
  - id: "CVE-2026-21980"
    title: "Authentication Bypass via Token Prediction"
    severity: "critical"
    cvss: 9.1
    affected_before: "2026.2.25"
    description: "Weak token generation allows prediction and brute-force of authentication tokens."
    remediation: "Upgrade to >= 2026.2.25"
