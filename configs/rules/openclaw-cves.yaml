  severity: medium
  cvss: 6.5
  affected_before: 2026.3.28
  description: Weak webhook secrets can be brute-forced because inbound authentication lacks sufficient rate limiting and retry controls.
  remediation: Upgrade to >= 2026.3.28 and rotate weak webhook secrets
  description_zh: 该漏洞与“Secret Brute Force on Nextcloud Talk Webhooks”相关。受影响版本为 2026.3.28 之前。成功利用后可能导致身份伪造、请求重放或认证被暴力猜解。
- id: CVE-2026-34425
