  severity: medium
  cvss: 6.7
  affected_before: 2026.2.13
  description: In OpenClaw 2026.1.12 through 2026.2.12, browser download helpers accepted unsanitized output paths. When invoked through browser control gateway routes, attackers with authenticated CLI access or an authenticated gateway RPC token could write downloads outside the intended temporary download directory.
  remediation: Upgrade to >= 2026.2.13 and sanitize browser download helper output paths
  description_zh: OpenClaw 2026.1.12 至 2026.2.12 的浏览器下载辅助逻辑接受未净化的输出路径；在已获得 CLI 认证或网关 RPC 令牌的条件下，可借此把下载内容写到临时下载目录之外。
