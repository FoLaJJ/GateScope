  description_zh: 该漏洞与“Nextcloud Talk Webhook Secret Brute Force”相关。受影响版本为 2026.3.28 之前。成功利用后可能导致身份伪造、请求重放或认证被暴力猜解。
- id: CVE-2026-33579
