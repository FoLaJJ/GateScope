meta:
  updated_at: '2026-04-03'
  verified_at: '2026-04-03'
  source_cutoff: '2026-04-03'
  source: OpenClaw GitHub Security Advisories + NVD OpenClaw corpus + CNNVD OpenClaw batch list
  notes: PoC severity/CVSS/remediation are normalized from the matching version rule when cve_id is present. External IDs are merged from configs/rules/openclaw-id-mappings.yaml and the UI renders all available CVE/CNNVD/GHSA aliases. CNNVD aliases now include the 155-entry OpenClaw batch mapping supplied from the March 2026 CNNVD bulletin list plus previously verified historical mappings.
cves:
- id: GHSA-846p-hgpv-vphc
  ghsa_id: GHSA-846p-hgpv-vphc
  title: QQ Bot structured payloads could read arbitrary local files
  severity: high
  cvss: 8.6
  affected_before: 2026.4.2
  description: Before OpenClaw 2026.4.2, QQ Bot structured media payloads could read local files from attacker-chosen paths and escape QQ Bot-owned media roots.
  remediation: Upgrade to >= 2026.4.2 and restrict QQ Bot media handling to trusted roots
  description_zh: 在 OpenClaw 2026.4.2 之前，QQ Bot 的结构化媒体载荷可使用攻击者控制的路径读取本地文件，并逃逸 QQ Bot 预期的媒体根目录限制。
- id: GHSA-m34q-h93w-vg5x
  ghsa_id: GHSA-m34q-h93w-vg5x
  title: OpenShell mirror mode could delete arbitrary remote directories when roots were mis-scoped
  severity: high
  cvss: 8.6
  affected_before: 2026.4.2
  description: Before OpenClaw 2026.4.2, the OpenShell mirror backend accepted arbitrary absolute remoteWorkspaceDir and remoteAgentWorkspaceDir values, allowing remote cleanup and overwrite operations against unintended directories.
  remediation: Upgrade to >= 2026.4.2 and reject arbitrary absolute remote workspace paths in mirror mode
  description_zh: 在 OpenClaw 2026.4.2 之前，OpenShell mirror 后端接受任意绝对路径形式的 remoteWorkspaceDir 和 remoteAgentWorkspaceDir，可能对非预期远程目录执行清理和覆盖操作。
- id: GHSA-98ch-45wp-ch47
  ghsa_id: GHSA-98ch-45wp-ch47
  title: Windows-compatible env override keys could bypass system.run approval binding
  severity: medium
  cvss: 5.3
  affected_before: 2026.4.2
  description: Before OpenClaw 2026.4.2, system-run approval binding normalized environment override keys differently from host execution, allowing Windows-compatible keys to bypass approval binding and still be injected at execution time.
  remediation: Upgrade to >= 2026.4.2 and align env override normalization between approval binding and execution
  description_zh: 在 OpenClaw 2026.4.2 之前，system.run 审批绑定和实际主机执行对环境变量覆盖键的规范化方式不一致，导致兼容 Windows 的键名可能绕过审批绑定后仍在执行时注入。
- id: GHSA-2f7j-rp58-mr42
  ghsa_id: GHSA-2f7j-rp58-mr42
  title: Gateway hello snapshots exposed host config and state paths to non-admin clients
  severity: low
  cvss: 3.7
  affected_before: 2026.4.2
  description: Before OpenClaw 2026.4.2, the Gateway connect success snapshot exposed local configPath and stateDir metadata to non-admin clients, leaking host filesystem layout and deployment details.
  remediation: Upgrade to >= 2026.4.2 and limit Gateway hello snapshots to role-appropriate metadata
  description_zh: 在 OpenClaw 2026.4.2 之前，Gateway 连接成功快照会向非管理员客户端暴露本地 configPath 和 stateDir 元数据，泄露主机文件系统布局和部署细节。
- id: GHSA-2qrv-rc5x-2g2h
  ghsa_id: GHSA-2qrv-rc5x-2g2h
  title: Untrusted workspace channel shadows could execute during built-in channel setup
  severity: medium
  cvss: 5.3
  affected_before: 2026.4.2
  description: Before OpenClaw 2026.4.2, built-in channel setup and login could resolve an untrusted workspace channel shadow before the plugin was explicitly trusted, allowing malicious plugin code to execute during setup.
  remediation: Upgrade to >= 2026.4.2 and require explicit trust before resolving workspace channel shadows
  description_zh: 在 OpenClaw 2026.4.2 之前，内置 channel 的初始化和登录流程可能在插件被显式信任前解析工作区中的同名 shadow channel，导致恶意插件代码在配置阶段执行。
- id: GHSA-5hff-46vh-rxmw
  ghsa_id: GHSA-5hff-46vh-rxmw
  title: Read-scoped identity-bearing HTTP clients could kill sessions via /sessions/:sessionKey/kill
  severity: medium
  cvss: 5.3
  affected_before: 2026.4.2
  description: Before OpenClaw 2026.4.2, POST /sessions/:sessionKey/kill did not enforce write scopes in identity-bearing HTTP modes, allowing read-only operators to terminate running subagent sessions.
  remediation: Upgrade to >= 2026.4.2 and enforce write scopes on session termination routes
  description_zh: 在 OpenClaw 2026.4.2 之前，身份承载式 HTTP 模式下的 POST /sessions/:sessionKey/kill 未校验写权限，导致仅具备只读权限的操作者也能终止运行中的子代理会话。
- id: GHSA-9jpj-g8vv-j5mf
  ghsa_id: GHSA-9jpj-g8vv-j5mf
  title: Gemini OAuth exposed the PKCE verifier through the OAuth state parameter
  severity: medium
  cvss: 5.3
  affected_before: 2026.4.2
  description: Before OpenClaw 2026.4.2, the Gemini OAuth flow reused the PKCE verifier as the OAuth state value, exposing the verifier alongside the authorization code in the redirect URL.
  remediation: Upgrade to >= 2026.4.2 and use a distinct unpredictable state value for Gemini OAuth flows
  description_zh: 在 OpenClaw 2026.4.2 之前，Gemini OAuth 流程把 PKCE verifier 直接复用于 OAuth state 参数，导致其可能随着重定向 URL 一并泄露。
- id: GHSA-4p4f-fc8q-84m3
  ghsa_id: GHSA-4p4f-fc8q-84m3
  title: iOS A2UI bridge trusted generic local-network pages for agent.request dispatch
  severity: medium
  cvss: 5.3
  affected_before: 2026.4.2
  description: Before OpenClaw 2026.4.2, the iOS A2UI bridge treated generic local-network pages as trusted bridge origins, allowing pages on local-network or tailnet hosts to trigger agent.request dispatch.
  remediation: Upgrade to >= 2026.4.2 and restrict agent.request dispatch to trusted canvas origins only
  description_zh: 在 OpenClaw 2026.4.2 之前，iOS A2UI bridge 会把普通局域网或 tailnet 页面视为受信任来源，从而允许这些页面触发 agent.request 分发。
- id: GHSA-jj6q-rrrf-h66h
  ghsa_id: GHSA-jj6q-rrrf-h66h
  title: Shared-secret comparison call sites leaked length information through timing
  severity: low
  cvss: 3.7
  affected_before: 2026.4.2
  description: Before OpenClaw 2026.4.2, several shared-secret comparison call sites still used early length-mismatch checks instead of a fixed-length helper, leaking secret-length information through timing differences.
  remediation: Upgrade to >= 2026.4.2 and use fixed-length shared-secret comparison helpers consistently
  description_zh: 在 OpenClaw 2026.4.2 之前，多个 shared-secret 比较点仍使用长度不一致即提前返回的逻辑，而非固定长度比较助手，可能通过时序差异泄露密钥长度信息。
- id: GHSA-fvx6-pj3r-5q4q
  ghsa_id: GHSA-fvx6-pj3r-5q4q
  title: Complex interpreter pipelines could skip exec script preflight validation
  severity: medium
  cvss: 5.3
  affected_before: 2026.4.2
  description: Before OpenClaw 2026.4.2, exec script preflight validation could fail open on complex interpreter invocations such as pipes or other non-simple command forms, skipping script-content validation entirely.
  remediation: Upgrade to >= 2026.4.2 and enforce exec preflight validation for complex interpreter invocations
  description_zh: 在 OpenClaw 2026.4.2 之前，复杂解释器调用形式如管道或其他非简单命令可能导致 exec 脚本预检失败后仍继续执行，从而跳过脚本内容校验。
- id: CVE-2026-27009
  title: Stored XSS in Control UI Assistant Identity Rendering
  severity: medium
  cvss: 5.8
  affected_before: 2026.2.15
  description: Assistant name or avatar values can break out of an inline script context in the Control UI and execute attacker-controlled JavaScript.
  remediation: Upgrade to >= 2026.2.15 and avoid serving bootstrap config through inline scripts
  description_zh: 该漏洞与“Stored XSS in Control UI Assistant Identity Rendering”相关。受影响版本为 2026.2.15 之前。成功利用后可能导致跨站脚本、提示注入或界面上下文被劫持。
- id: CVE-2026-24764
  title: Slack Channel Metadata Prompt Injection
  severity: low
  cvss: 3.7
  affected_before: 2026.2.3
  description: When Slack integration is enabled, untrusted channel topic or description metadata can be treated as higher-trust prompt context and expand prompt-injection surface.
  remediation: Upgrade to >= 2026.2.3 and avoid trusting external Slack metadata as system-level prompt input
  description_zh: 该漏洞与“Slack Channel Metadata Prompt Injection”相关。受影响版本为 2026.2.3 之前。成功利用后可能导致跨站脚本、提示注入或界面上下文被劫持。
- id: CVE-2026-34510
  title: SMB Path Injection via Upload Inputs
  severity: medium
  cvss: 5.3
  affected_before: 2026.3.28
  description: Untrusted upload path inputs can trigger SMB-style outbound path resolution and expose the host to unintended network file access.
  remediation: Upgrade to >= 2026.3.28 and reject external or UNC-style upload paths
  description_zh: 该漏洞与“SMB Path Injection via Upload Inputs”相关。受影响版本为 2026.3.28 之前。成功利用后会对 OpenClaw 的认证、授权、沙箱隔离或运行安全造成影响。
- id: CVE-2026-34509
  title: Pair Approval Scope Escalation
  severity: high
  cvss: 8.6
  affected_before: 2026.3.28
  description: Low-privilege operators can approve pairing requests with broader scopes than intended because approval-time scope validation is incomplete.
  remediation: Upgrade to >= 2026.3.28
  description_zh: 该漏洞与“Pair Approval Scope Escalation”相关。受影响版本为 2026.3.28 之前。成功利用后可能导致未授权访问、权限提升或安全策略绕过。
- id: CVE-2026-34508
