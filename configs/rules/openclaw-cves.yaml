  description: 'OpenClaw is a personal AI assistant. In versions 2026.1.30 and below, if channels.telegram.webhookSecret is
    not set when in Telegram webhook mode, OpenClaw may accept webhook HTTP requests without verifying Telegram’s secret token
    header. In deployments where the webhook endpoint is reachable by an attacker, this can allow forged Telegram updates
    (for example spoofing message.from.id). If an attacker can reach the webhook endpoint, they may be able to send forged
    updates that are processed as if they came from Telegram. Depending on enabled commands/tools and configuration, this
    could lead to unintended bot actions. Note: Telegram webhook mode is not enabled by default. It is enabled only when `channels.telegram.webhookUrl`
    is configured. This issue has been fixed in version 2026.2.1.'
  remediation: Upgrade to the latest OpenClaw release that includes the vendor fix
  cve_id: CVE-2026-25474
  description_zh: 该漏洞与“has a Telegram webhook request forgery (missing `channels.telegram.webhookSecret`) → auth bypass”相关。成功利用后可能导致身份伪造、请求重放或认证被暴力猜解。
