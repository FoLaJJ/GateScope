  remediation: Upgrade to >= 2026.3.28
  description_zh: 该漏洞与“Unauthorized Media Fetch and Disk Write”相关。受影响版本为 2026.3.28 之前。成功利用后会对 OpenClaw 的认证、授权、沙箱隔离或运行安全造成影响。
- id: CVE-2026-33575
  title: Long-Lived Gateway Credentials in Setup Codes
  severity: high
  cvss: 8.6
  affected_before: 2026.3.12
  description: Pairing setup codes embed reusable shared gateway credentials, so leaked QR codes or chat history can expose credentials beyond the intended one-time flow.
  remediation: Upgrade to >= 2026.3.12 and rotate exposed setup codes or shared gateway credentials
  description_zh: 该漏洞与“Long-Lived Gateway Credentials in Setup Codes”相关。受影响版本为 2026.3.12 之前。成功利用后可能导致敏感信息、凭证或内部状态泄露。
- id: CVE-2026-33574
