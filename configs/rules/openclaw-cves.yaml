  severity: high
  cvss: 7.5
  affected_before: 2026.2.14
  description: OpenClaw before 2026.2.14 could bypass SSRF protections with full-form IPv4-mapped IPv6 literals such as 0:0:0:0:0:ffff:7f00:1, allowing requests to loopback, private-network, or link-local metadata targets that should have been blocked.
  remediation: Upgrade to >= 2026.2.14 and reject full-form IPv4-mapped IPv6 literals in SSRF target validation
  description_zh: OpenClaw 在 2026.2.14 之前对全写形式的 IPv4 映射 IPv6 地址校验不严，例如 0:0:0:0:0:ffff:7f00:1，可绕过 SSRF 防护访问回环、内网或链路本地元数据地址。
