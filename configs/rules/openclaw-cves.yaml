  description_zh: 该漏洞与“Message Tool Sandbox Bypass via Alias URLs”相关。受影响版本为 2026.3.24 之前。成功利用后会对 OpenClaw 的认证、授权、沙箱隔离或运行安全造成影响。
- id: CVE-2026-33580
