  remediation: Upgrade to >= 2026.3.28
  description_zh: 该漏洞与“Sender Policy Downgrade in Google Chat and Zalouser”相关。受影响版本为 2026.3.28 之前。成功利用后会对 OpenClaw 的认证、授权、沙箱隔离或运行安全造成影响。
