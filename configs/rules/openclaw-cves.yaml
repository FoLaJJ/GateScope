cves:
- id: CVE-2026-4040
  title: File Existence tools.exec.safeBins information exposure
  severity: low
  cvss: 4.8
  affected_before: 2026.2.19-beta.1
  description: A vulnerability was identified in OpenClaw up to 2026.2.17. This issue affects the function tools.exec.safeBins
    of the component File Existence Handler. The manipulation leads to information exposure through discrepancy. The attack
    needs to be performed locally. Upgrading to version 2026.2.19-beta.1 is capable of addressing this issue. The identifier
    of the patch is bafdbb6f112409a65decd3d4e7350fbd637c7754. Upgrading the affected component is advised.
  remediation: Upgrade to >= 2026.2.19-beta.1
  cve_id: CVE-2026-4040
  description_zh: 该漏洞与“File Existence tools.exec.safeBins information exposure”相关。受影响版本为 2026.2.19-beta.1 之前。成功利用后会对 OpenClaw
    的认证、授权、沙箱隔离或运行安全造成影响。
  cnnvd_id: CNNVD-202603-2423
- id: CVE-2026-4039
  title: Skill Env applySkillConfigenvOverrides code injection
  severity: medium
  cvss: 5.3
  affected_before: 2026.2.21-beta.1
  description: A vulnerability was determined in OpenClaw 2026.2.19-2. This vulnerability affects the function applySkillConfigenvOverrides
    of the component Skill Env Handler. Executing a manipulation can lead to code injection. It is possible to launch the
    attack remotely. Upgrading to version 2026.2.21-beta.1 is able to resolve this issue. This patch is called 8c9f35cdb51692b650ddf05b259ccdd75cc9a83c.
    It is recommended to upgrade the affected component.
  remediation: Upgrade to >= 2026.2.21-beta.1
  cve_id: CVE-2026-4039
  description_zh: 该漏洞与“Skill Env applySkillConfigenvOverrides code injection”相关。受影响版本为 2026.2.21-beta.1 之前。成功利用后可能导致命令注入或任意代码执行。
  cnnvd_id: CNNVD-202603-2424
- id: CVE-2026-34511
  title: PKCE Verifier Exposure via OAuth State Parameter
  severity: medium
  cvss: 6.0
  affected_before: 2026.4.2
  description: OpenClaw before 2026.4.2 reuses the PKCE verifier as the OAuth state parameter in the Gemini OAuth flow, exposing
    it through the redirect URL. Attackers who capture the redirect URL can obtain both the authorization code and PKCE verifier,
    defeating PKCE protection and enabling token redemption.
  remediation: Upgrade to >= 2026.4.2
  cve_id: CVE-2026-34511
  description_zh: 该漏洞与“PKCE Verifier Exposure via OAuth State Parameter”相关。受影响版本为 2026.4.2 之前。成功利用后可能导致敏感信息、凭证或内部状态泄露。
- id: CVE-2026-34510
  title: Remote File URL Acceptance in Windows Media Loaders
  severity: medium
  cvss: 6.9
  affected_before: 2026.3.22
  description: OpenClaw before 2026.3.22 contains a path traversal vulnerability in Windows media loaders that accepts remote-host
    file URLs and UNC-style paths before local-path validation. Attackers can exploit this by providing network-hosted file
    targets that are treated as local content, bypassing intended access restrictions.
  remediation: Upgrade to >= 2026.3.22
  cve_id: CVE-2026-34510
  description_zh: 该漏洞与“Remote File URL Acceptance in Windows Media Loaders”相关。受影响版本为 2026.3.22 之前。成功利用后可能导致目录遍历、越权读写或沙箱边界突破。
- id: CVE-2026-34506
  title: Sender Allowlist Bypass in Microsoft Teams Plugin via Route Allowlist Configuration
  severity: medium
  cvss: 2.3
  affected_before: 2026.3.8
  description: OpenClaw before 2026.3.8 contains a sender allowlist bypass vulnerability in its Microsoft Teams plugin that
    allows unauthorized senders to bypass intended authorization checks. When a team/channel route allowlist is configured
    with an empty groupAllowFrom parameter, the message handler synthesizes wildcard sender authorization, permitting any
    sender in the matched team/channel to trigger replies in allowlisted Teams routes.
  remediation: Upgrade to >= 2026.3.8
  cve_id: CVE-2026-34506
  description_zh: 该漏洞与“Sender Allowlist Bypass in Microsoft Teams Plugin via Route Allowlist Configuration”相关。受影响版本为 2026.3.8
    之前。成功利用后可能导致未授权访问、权限提升或安全策略绕过。
  cnnvd_id: CNNVD-202603-6223
- id: CVE-2026-34505
  title: Webhook Rate Limiting Bypass via Pre-Authentication Secret Validation
  severity: medium
  cvss: 6.9
  affected_before: 2026.3.12
  description: OpenClaw before 2026.3.12 applies rate limiting only after successful webhook authentication, allowing attackers
    to bypass rate limits and brute-force webhook secrets. Attackers can submit repeated authentication requests with invalid
    secrets without triggering rate limit responses, enabling systematic secret guessing and subsequent forged webhook submission.
  remediation: Upgrade to >= 2026.3.12
  cve_id: CVE-2026-34505
  description_zh: 该漏洞与“Webhook Rate Limiting Bypass via Pre-Authentication Secret Validation”相关。受影响版本为 2026.3.12 之前。成功利用后会对
    OpenClaw 的认证、授权、沙箱隔离或运行安全造成影响。
  cnnvd_id: CNNVD-202603-6224
- id: CVE-2026-34504
  title: Server-Side Request Forgery via Unguarded Image Download in fal Provider
  severity: high
  cvss: 6.9
  affected_before: 2026.3.28
  description: OpenClaw before 2026.3.28 contains a server-side request forgery vulnerability in the fal provider image-generation-provider.ts
    component that allows attackers to fetch internal URLs. A malicious or compromised fal relay can exploit unguarded image
    download fetches to expose internal service metadata and responses through the image pipeline.
  remediation: Upgrade to >= 2026.3.28
  cve_id: CVE-2026-34504
  description_zh: 该漏洞与“Server-Side Request Forgery via Unguarded Image Download in fal Provider”相关。受影响版本为 2026.3.28 之前。成功利用后可能导致服务端请求伪造并访问内网或云元数据资源。
  cnnvd_id: CNNVD-202603-6187
- id: CVE-2026-34503
  title: Incomplete WebSocket Session Termination on Device Removal and Token Revocation
  severity: high
  cvss: 8.6
  affected_before: 2026.3.28
  description: OpenClaw before 2026.3.28 fails to disconnect active WebSocket sessions when devices are removed or tokens
    are revoked. Attackers with revoked credentials can maintain unauthorized access through existing live sessions until
    forced reconnection.
  remediation: Upgrade to >= 2026.3.28
  cve_id: CVE-2026-34503
  description_zh: 该漏洞与“Incomplete WebSocket Session Termination on Device Removal and Token Revocation”相关。受影响版本为 2026.3.28
    之前。成功利用后可能导致敏感信息、凭证或内部状态泄露。
  cnnvd_id: CNNVD-202603-6184
- id: CVE-2026-34426
  title: Approval Bypass via Environment Variable Normalization
  severity: medium
  cvss: 6.9
  affected_before: b57b680c0c34de907d57f60c38fb358e82aef8f7
  description: OpenClaw versions prior to commit b57b680 contain an approval bypass vulnerability due to inconsistent environment
    variable normalization between approval and execution paths, allowing attackers to inject attacker-controlled environment
    variables into execution without approval system validation. Attackers can exploit differing normalization logic to discard
    non-portable keys during approval processing while accepting them at execution time, bypassing operator review and potentially
    influencing runtime behavior including execution of attacker-controlled binaries.
  remediation: Upgrade to >= b57b680c0c34de907d57f60c38fb358e82aef8f7
  cve_id: CVE-2026-34426
  description_zh: 该漏洞与“Approval Bypass via Environment Variable Normalization”相关。受影响版本为 b57b680c0c34de907d57f60c38fb358e82aef8f7
    之前。成功利用后会对 OpenClaw 的认证、授权、沙箱隔离或运行安全造成影响。
- id: CVE-2026-34425
  title: Shell-Bleed Protection Preflight Validation Bypass
  severity: medium
  cvss: 5.3
  affected_before: 8aceaf5d0f0ec552b75a792f7f0a3bfa5b091513
  description: OpenClaw versions prior to commit 8aceaf5 contain a preflight validation bypass vulnerability in shell-bleed
    protection that allows attackers to execute blocked script content by using piped or complex command forms that the parser
    fails to recognize. Attackers can craft commands such as piped execution, command substitution, or subshell invocation
    to bypass the validateScriptFileForShellBleed() validation checks and execute arbitrary script content that would otherwise
    be blocked.
  remediation: Upgrade to >= 8aceaf5d0f0ec552b75a792f7f0a3bfa5b091513
  cve_id: CVE-2026-34425
  description_zh: 该漏洞与“Shell-Bleed Protection Preflight Validation Bypass”相关。受影响版本为 8aceaf5d0f0ec552b75a792f7f0a3bfa5b091513
    之前。成功利用后可能导致命令注入或任意代码执行。
- id: CVE-2026-33581
  title: Arbitrary File Read via mediaUrl and fileUrl Parameters
  severity: medium
  cvss: 7.1
  affected_before: 2026.3.24
  description: OpenClaw before 2026.3.24 contains a sandbox bypass vulnerability in the message tool that allows attackers
    to read arbitrary local files by using mediaUrl and fileUrl alias parameters that bypass localRoots validation. Remote
    attackers can exploit this by routing file requests through unvalidated alias parameters to access files outside the intended
    sandbox directory.
  remediation: Upgrade to >= 2026.3.24
  cve_id: CVE-2026-33581
  description_zh: 该漏洞与“Arbitrary File Read via mediaUrl and fileUrl Parameters”相关。受影响版本为 2026.3.24 之前。成功利用后会对 OpenClaw 的认证、授权、沙箱隔离或运行安全造成影响。
  cnnvd_id: CNNVD-202603-6197
- id: CVE-2026-33580
  title: Brute Force Attack via Missing Rate Limiting on Webhook Shared Secret Authentication
  severity: medium
  cvss: 6.3
  affected_before: 2026.3.28
  description: OpenClaw before 2026.3.28 contains a missing rate limiting vulnerability in the Nextcloud Talk webhook authentication
    that allows attackers to brute-force weak shared secrets. Attackers who can reach the webhook endpoint can exploit this
    to forge inbound webhook events by repeatedly attempting authentication without throttling.
  remediation: Upgrade to >= 2026.3.28
  cve_id: CVE-2026-33580
  description_zh: 该漏洞与“Brute Force Attack via Missing Rate Limiting on Webhook Shared Secret Authentication”相关。受影响版本为 2026.3.28
    之前。成功利用后可能导致身份伪造、请求重放或认证被暴力猜解。
  cnnvd_id: CNNVD-202603-6200
- id: CVE-2026-33579
  title: Privilege Escalation via Missing Caller Scope Validation in Device Pair Approval
  severity: high
  cvss: 8.6
  affected_before: 2026.3.28
  description: OpenClaw before 2026.3.28 contains a privilege escalation vulnerability in the /pair approve command path that
    fails to forward caller scopes into the core approval check. A caller with pairing privileges but without admin privileges
    can approve pending device requests asking for broader scopes including admin access by exploiting the missing scope validation
    in extensions/device-pair/index.ts and src/infra/device-pairing.ts.
  remediation: Upgrade to >= 2026.3.28
  cve_id: CVE-2026-33579
  description_zh: 该漏洞与“Privilege Escalation via Missing Caller Scope Validation in Device Pair Approval”相关。受影响版本为 2026.3.28
    之前。成功利用后可能导致未授权访问、权限提升或安全策略绕过。
  cnnvd_id: CNNVD-202603-6201
- id: CVE-2026-33578
  title: Sender Policy Allowlist Bypass via Policy Downgrade in Google Chat and Zalouser Extensions
  severity: medium
  cvss: 5.3
  affected_before: 2026.3.28
  description: OpenClaw before 2026.3.28 contains a sender policy bypass vulnerability in the Google Chat and Zalouser extensions
    where route-level group allowlist policies silently downgrade to open policy. Attackers can exploit this policy resolution
    flaw to bypass sender restrictions and interact with bots despite configured allowlist restrictions.
  remediation: Upgrade to >= 2026.3.28
  cve_id: CVE-2026-33578
  description_zh: 该漏洞与“Sender Policy Allowlist Bypass via Policy Downgrade in Google Chat and Zalouser Extensions”相关。受影响版本为
    2026.3.28 之前。成功利用后可能导致未授权访问、权限提升或安全策略绕过。
  cnnvd_id: CNNVD-202603-6203
- id: CVE-2026-33577
  title: Insufficient Scope Validation in node.pair.approve
  severity: high
  cvss: 8.6
  affected_before: 2026.3.28
  description: OpenClaw before 2026.3.28 contains an insufficient scope validation vulnerability in the node pairing approval
    path that allows low-privilege operators to approve nodes with broader scopes. Attackers can exploit missing callerScopes
    validation in node-pairing.ts to extend privileges onto paired nodes beyond their authorization level.
  remediation: Upgrade to >= 2026.3.28
  cve_id: CVE-2026-33577
  description_zh: 该漏洞与“Insufficient Scope Validation in node.pair.approve”相关。受影响版本为 2026.3.28 之前。成功利用后可能导致未授权访问、权限提升或安全策略绕过。
  cnnvd_id: CNNVD-202603-6202
- id: CVE-2026-33576
  title: Unauthorized Media Download via Zalo Channel
  severity: medium
  cvss: 6.9
  affected_before: 2026.3.28
  description: OpenClaw before 2026.3.28 downloads and stores inbound media from Zalo channels before validating sender authorization.
    Unauthorized senders can force network fetches and disk writes to the media store by sending messages that are subsequently
    rejected.
  remediation: Upgrade to >= 2026.3.28
  cve_id: CVE-2026-33576
  description_zh: 该漏洞与“Unauthorized Media Download via Zalo Channel”相关。受影响版本为 2026.3.28 之前。成功利用后会对 OpenClaw 的认证、授权、沙箱隔离或运行安全造成影响。
  cnnvd_id: CNNVD-202603-6204
- id: CVE-2026-33575
  title: Long-lived Credential Exposure in Pairing Setup Codes
  severity: high
  cvss: 8.6
  affected_before: 2026.3.12
  description: OpenClaw before 2026.3.12 embeds long-lived shared gateway credentials directly in pairing setup codes generated
    by /pair endpoint and OpenClaw qr command. Attackers with access to leaked setup codes from chat history, logs, or screenshots
    can recover and reuse the shared gateway credential outside the intended one-time pairing flow.
  remediation: Upgrade to >= 2026.3.12
  cve_id: CVE-2026-33575
  description_zh: 该漏洞与“Long-lived Credential Exposure in Pairing Setup Codes”相关。受影响版本为 2026.3.12 之前。成功利用后可能导致敏感信息、凭证或内部状态泄露。
  cnnvd_id: CNNVD-202603-5847
- id: CVE-2026-33574
  title: Path Traversal via Tools Root Rebinding in Skills Download
  severity: medium
  cvss: 5.8
  affected_before: 2026.3.8
  description: OpenClaw before 2026.3.8 contains a path traversal vulnerability in the skills download installer that validates
    the tools root lexically but reuses the mutable path during archive download and copy operations. A local attacker can
    rebind the tools-root path between validation and final write to redirect the installer outside the intended tools directory.
  remediation: Upgrade to >= 2026.3.8
  cve_id: CVE-2026-33574
  description_zh: 该漏洞与“Path Traversal via Tools Root Rebinding in Skills Download”相关。受影响版本为 2026.3.8 之前。成功利用后可能导致目录遍历、越权读写或沙箱边界突破。
  cnnvd_id: CNNVD-202603-5848
- id: CVE-2026-33573
  title: Workspace Boundary Bypass via Agent RPC Parameters
  severity: high
  cvss: 8.7
  affected_before: 2026.3.11
  description: OpenClaw before 2026.3.11 contains an authorization bypass vulnerability in the gateway agent RPC that allows
    authenticated operators with operator.write permission to override workspace boundaries by supplying attacker-controlled
    spawnedBy and workspaceDir values. Remote operators can escape the configured workspace boundary and execute arbitrary
    file and exec operations from any process-accessible directory.
  remediation: Upgrade to >= 2026.3.11
  cve_id: CVE-2026-33573
  description_zh: 该漏洞与“Workspace Boundary Bypass via Agent RPC Parameters”相关。受影响版本为 2026.3.11 之前。成功利用后可能导致未授权访问、权限提升或安全策略绕过。
  cnnvd_id: CNNVD-202603-5850
- id: CVE-2026-33572
  title: Insufficient File Permissions in Session Transcript Files
  severity: high
  cvss: 6.8
  affected_before: 2026.2.17
  description: OpenClaw before 2026.2.17 creates session transcript JSONL files with overly broad default permissions, allowing
    local users to read transcript contents. Attackers with local access can read transcript files to extract sensitive information
    including secrets from tool output.
  remediation: Upgrade to >= 2026.2.17
  cve_id: CVE-2026-33572
  description_zh: 该漏洞与“Insufficient File Permissions in Session Transcript Files”相关。受影响版本为 2026.2.17 之前。成功利用后会对 OpenClaw 的认证、授权、沙箱隔离或运行安全造成影响。
  cnnvd_id: CNNVD-202603-5849
- id: CVE-2026-32988
  title: Sandbox Boundary Bypass via Unvalidated Temporary File Creation
  severity: high
  cvss: 5.8
  affected_before: 2026.3.11
  description: OpenClaw before 2026.3.11 contains a sandbox boundary bypass vulnerability in fs-bridge staged writes where
    temporary file creation and population are not pinned to a verified parent directory. Attackers can exploit a race condition
    in parent-path alias changes to write attacker-controlled bytes outside the intended validated path before the final guarded
    replace step executes.
  remediation: Upgrade to >= 2026.3.11
  cve_id: CVE-2026-32988
  description_zh: 该漏洞与“Sandbox Boundary Bypass via Unvalidated Temporary File Creation”相关。受影响版本为 2026.3.11 之前。成功利用后可能导致目录遍历、越权读写或沙箱边界突破。
  cnnvd_id: CNNVD-202603-6225
- id: CVE-2026-32987
  title: Bootstrap Setup Code Replay via Device Pairing
  severity: critical
  cvss: 9.3
  affected_before: 2026.3.13
  description: OpenClaw before 2026.3.13 allows bootstrap setup codes to be replayed during device pairing verification in
    src/infra/device-bootstrap.ts. Attackers can verify a valid bootstrap code multiple times before approval to escalate
    pending pairing scopes, including privilege escalation to operator.admin.
  remediation: Upgrade to >= 2026.3.13
  cve_id: CVE-2026-32987
  description_zh: 该漏洞与“Bootstrap Setup Code Replay via Device Pairing”相关。受影响版本为 2026.3.13 之前。成功利用后可能导致未授权访问、权限提升或安全策略绕过。
  cnnvd_id: CNNVD-202603-5854
- id: CVE-2026-32982
  title: Telegram Bot Token Exposure in Media Fetch Error Logs
  severity: high
  cvss: 8.7
  affected_before: 2026.3.13
  description: OpenClaw before 2026.3.13 contains an information disclosure vulnerability in the fetchRemoteMedia function
    that exposes Telegram bot tokens in error messages. When media downloads fail, the original Telegram file URLs containing
    bot tokens are embedded in MediaFetchError strings and leaked to logs and error surfaces.
  remediation: Upgrade to >= 2026.3.13
  cve_id: CVE-2026-32982
  description_zh: 该漏洞与“Telegram Bot Token Exposure in Media Fetch Error Logs”相关。受影响版本为 2026.3.13 之前。成功利用后可能导致敏感信息、凭证或内部状态泄露。
  cnnvd_id: CNNVD-202603-6226
- id: CVE-2026-32980
  title: Resource Exhaustion via Unauthenticated Telegram Webhook Request
  severity: high
  cvss: 8.7
  affected_before: 2026.3.13
  description: OpenClaw before 2026.3.13 reads and buffers Telegram webhook request bodies before validating the x-telegram-bot-api-secret-token
    header, allowing unauthenticated attackers to exhaust server resources. Attackers can send POST requests to the webhook
    endpoint to force memory consumption, socket time, and JSON parsing work before authentication validation occurs.
  remediation: Upgrade to >= 2026.3.13
  cve_id: CVE-2026-32980
  description_zh: 该漏洞与“Resource Exhaustion via Unauthenticated Telegram Webhook Request”相关。受影响版本为 2026.3.13 之前。成功利用后可能导致拒绝服务、资源耗尽或稳定性下降。
  cnnvd_id: CNNVD-202603-5851
- id: CVE-2026-32979
  title: Unbound Interpreter and Runtime Commands Bypass in node-host Approval
  severity: high
  cvss: 7.0
  affected_before: 2026.3.11
  description: OpenClaw before 2026.3.11 contains an approval integrity vulnerability allowing attackers to execute rewritten
    local code by modifying scripts between approval and execution when exact file binding cannot occur. Remote attackers
    can change approved local scripts before execution to achieve unintended code execution as the OpenClaw runtime user.
  remediation: Upgrade to >= 2026.3.11
  cve_id: CVE-2026-32979
  description_zh: 该漏洞与“Unbound Interpreter and Runtime Commands Bypass in node-host Approval”相关。受影响版本为 2026.3.11 之前。成功利用后可能导致命令注入或任意代码执行。
  cnnvd_id: CNNVD-202603-5853
- id: CVE-2026-32978
  title: Approval Bypass via Unrecognized Script Runners
  severity: high
  cvss: 9.4
  affected_before: 2026.3.11
  description: OpenClaw before 2026.3.11 contains an approval integrity vulnerability where system.run approvals fail to bind
    mutable file operands for certain script runners like tsx and jiti. Attackers can obtain approval for benign script commands,
    rewrite referenced scripts on disk, and execute modified code under the approved run context.
  remediation: Upgrade to >= 2026.3.11
  cve_id: CVE-2026-32978
  description_zh: 该漏洞与“Approval Bypass via Unrecognized Script Runners”相关。受影响版本为 2026.3.11 之前。成功利用后会对 OpenClaw 的认证、授权、沙箱隔离或运行安全造成影响。
  cnnvd_id: CNNVD-202603-5852
- id: CVE-2026-32977
  title: Sandbox Boundary Bypass via Unanchored writeFile Commit Path
  severity: medium
  cvss: 5.8
  affected_before: 2026.3.11
  description: OpenClaw before 2026.3.11 contains a sandbox boundary bypass vulnerability in the fs-bridge writeFile commit
    step that uses an unanchored container path during the final move operation. An attacker can exploit a time-of-check-time-of-use
    race condition by modifying parent paths inside the sandbox to redirect committed files outside the validated writable
    path within the container mount namespace.
  remediation: Upgrade to >= 2026.3.11
  cve_id: CVE-2026-32977
  description_zh: 该漏洞与“Sandbox Boundary Bypass via Unanchored writeFile Commit Path”相关。受影响版本为 2026.3.11 之前。成功利用后可能导致目录遍历、越权读写或沙箱边界突破。
  cnnvd_id: CNNVD-202603-6229
- id: CVE-2026-32976
  title: Account-Scoped configWrites Policy Bypass via Channel Commands
  severity: medium
  cvss: 7.1
  affected_before: 2026.3.11
  description: 'OpenClaw before 2026.3.11 contains an authorization bypass vulnerability allowing channel commands to mutate
    protected sibling-account configuration despite configWrites restrictions. Attackers with authorized access on one account
    can execute channel commands like /config set channels.<provider>.accounts.<id> to modify configuration on target accounts
    with configWrites: false.'
  remediation: Upgrade to >= 2026.3.11
  cve_id: CVE-2026-32976
  description_zh: 该漏洞与“Account-Scoped configWrites Policy Bypass via Channel Commands”相关。受影响版本为 2026.3.11 之前。成功利用后可能导致未授权访问、权限提升或安全策略绕过。
  cnnvd_id: CNNVD-202603-6227
