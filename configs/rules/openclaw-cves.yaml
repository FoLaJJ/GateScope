- id: CVE-2026-25157
  title: OpenClaw/Clawdbot has OS Command Injection via Project Root Path in sshNodeCommand
  severity: high
  cvss: 7.8
  affected_before: ''
  description: OpenClaw is a personal AI assistant. Prior to version 2026.1.29, there is an OS command injection vulnerability
    via the Project Root Path in sshNodeCommand. The sshNodeCommand function constructed a shell script without properly escaping
    the user-supplied project path in an error message. When the cd command failed, the unescaped path was interpolated directly
    into an echo statement, allowing arbitrary command execution on the remote SSH host. The parseSSHTarget function did not
    validate that SSH target strings could not begin with a dash. An attacker-supplied target like -oProxyCommand=... would
    be interpreted as an SSH configuration flag rather than a hostname, allowing arbitrary command execution on the local
    machine. This issue has been patched in version 2026.1.29.
  remediation: Upgrade to the latest OpenClaw release that includes the vendor fix
  cve_id: CVE-2026-25157
  description_zh: 该漏洞与“OpenClaw/Clawdbot has OS Command Injection via Project Root Path in sshNodeCommand”相关。成功利用后可能导致命令注入或任意代码执行。
