  description_zh: 该漏洞与“Inbound Policy Downgrade in Route Sender Controls”相关。受影响版本为 2026.3.28 之前。成功利用后会对 OpenClaw 的认证、授权、沙箱隔离或运行安全造成影响。
- id: CVE-2026-34506
  title: Node Pair Caller Scope Validation Bypass
  severity: high
  cvss: 8.6
  affected_before: 2026.3.28
  description: Caller scopes are not enforced correctly in node pairing approval logic, enabling broader device privileges than the operator should receive.
  remediation: Upgrade to >= 2026.3.28
  description_zh: 该漏洞与“Node Pair Caller Scope Validation Bypass”相关。受影响版本为 2026.3.28 之前。成功利用后可能导致未授权访问、权限提升或安全策略绕过。
- id: CVE-2026-34505
  title: Pre-Authorization Media Fetch and Disk Write
  severity: medium
  cvss: 6.9
  affected_before: 2026.3.28
  description: Inbound media can be fetched and written to disk before sender authorization is verified, allowing unwanted network and storage activity.
  remediation: Upgrade to >= 2026.3.28
  description_zh: 该漏洞与“Pre-Authorization Media Fetch and Disk Write”相关。受影响版本为 2026.3.28 之前。成功利用后会对 OpenClaw 的认证、授权、沙箱隔离或运行安全造成影响。
- id: CVE-2026-34504
