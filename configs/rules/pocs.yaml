pocs:
  - id: "ws_origin_bypass"
    name: "Trusted-Proxy WebSocket Origin Bypass"
    cve_id: "CVE-2026-32302"
    severity: "high"
    cvss: 8.1
    remediation: "Upgrade to >= 2026.3.11 and reject untrusted browser origins when gateway.auth.mode=trusted-proxy"
  - id: "ssrf_proxy"
    name: "IPv4-Mapped IPv6 SSRF Guard Bypass"
    cve_id: "CVE-2026-26324"
    severity: "high"
    cvss: 7.5
    remediation: "Upgrade to >= 2026.2.14 and block full-form IPv4-mapped IPv6 literals in SSRF guards"
  - id: "avatar_symlink_traversal"
    name: "Control UI Avatar Symlink Traversal"
    cve_id: "CVE-2026-32024"
    severity: "medium"
    cvss: 5.5
    remediation: "Upgrade to >= 2026.2.22 and block avatar symlink escapes outside the workspace boundary"
  - id: "unauth_api"
    name: "Unauthenticated API Access"
    cve_id: ""
    severity: "high"
    cvss: 8.0
    remediation: "Configure authentication (token_auth or device_auth) for all API endpoints"
